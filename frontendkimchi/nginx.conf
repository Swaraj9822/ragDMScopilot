server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Document uploads default to a 10 MiB cap server-side; allow a little headroom.
    client_max_body_size 25m;

    # SPA: serve static assets, fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy. The trailing slash on proxy_pass strips the "/api"
    # prefix, so /api/auth/login -> http://api:8000/auth/login.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI queries can run for minutes; don't cut them off early.
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Stream Server-Sent Events (/api/ask/stream) without buffering so
        # tokens flush to the browser as they arrive.
        proxy_buffering off;
        proxy_cache off;
    }
}
